name: Build Windows x64 Setup

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        shell: powershell
        run: |
          git fetch --tags --force

          $isTagRelease = "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true"
          $currentTag = "${{ github.ref_name }}"
          $packageInfo = Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $releaseVersion = if ($isTagRelease) {
            $currentTag -replace '^v', ''
          } else {
            $packageInfo.version
          }
          $changelogPath = "CHANGELOG.md"

          function Get-ChangelogSection {
            param(
              [string] $Path,
              [string] $Version,
              [bool] $UseUnreleased
            )

            if (-not (Test-Path $Path)) {
              return ""
            }

            $lines = Get-Content $Path -Encoding UTF8
            $escapedVersion = [Regex]::Escape($Version)
            $versionHeadingPattern = "^\s*##\s+\[?v?$escapedVersion\]?(?:\s+-\s+.*)?\s*$"
            $unreleasedHeadingPattern = "^\s*##\s+\[?Unreleased\]?\s*$"
            $headingPattern = if ($UseUnreleased) { $unreleasedHeadingPattern } else { $versionHeadingPattern }
            $capture = $false
            $section = New-Object System.Collections.Generic.List[string]

            foreach ($line in $lines) {
              if ($line -match $headingPattern) {
                $capture = $true
                continue
              }

              if ($capture -and $line -match "^\s*##\s+") {
                break
              }

              if ($capture) {
                $section.Add($line)
              }
            }

            return ($section -join "`n").Trim()
          }

          $notes = Get-ChangelogSection -Path $changelogPath -Version $releaseVersion -UseUnreleased:(!$isTagRelease)

          if ($isTagRelease -and -not $notes) {
            Write-Error "Missing CHANGELOG.md section for version $releaseVersion. Add a heading like '## [$releaseVersion]' before publishing."
            exit 1
          }

          if (-not $notes) {
            $commits = git log -20 --pretty=format:"- %s (%h)" |
              Where-Object { $_ -and $_.Trim() -ne "" }

            if (-not $commits -or $commits.Count -eq 0) {
              $commits = @("- This build contains generated artifacts.")
            }

            $notes = @(
              "## Changes",
              "",
              $commits
            ) -join "`n"
          }

          $delimiter = "RELEASE_NOTES_" + [Guid]::NewGuid().ToString("N")
          "body<<$delimiter" >> $env:GITHUB_OUTPUT
          $notes >> $env:GITHUB_OUTPUT
          "$delimiter" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Build Tauri App (NSIS x64 Setup Only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: true
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'windows-auto-build' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('PackFlow Workbench {0}', github.ref_name) || 'PackFlow Workbench Auto Build' }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: --ci --bundles nsis
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          uploadPlainBinary: false
          retryAttempts: 2

      - name: Prepare x64 Setup EXE
        shell: powershell
        run: |
          $bundleDir = "src-tauri\target\release\bundle\nsis"

          if (-not (Test-Path $bundleDir)) {
            Write-Error -Message "NSIS bundle directory not found: $bundleDir"
            exit 1
          }

          $setupFiles = Get-ChildItem -Path $bundleDir -Filter "*setup*.exe" -File

          if (-not $setupFiles -or $setupFiles.Count -eq 0) {
            Write-Error -Message "No NSIS setup EXE found in $bundleDir"
            Get-ChildItem -Path $bundleDir | Select-Object FullName
            exit 1
          }

          $sourceExe = ($setupFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path "release-dist" | Out-Null

          $setupName = "PackFlow Workbench_x64-setup.exe"
          Copy-Item $sourceExe "release-dist\$setupName" -Force

          Write-Host "Setup EXE prepared: release-dist\$setupName"

      - name: Upload x64 Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PackFlow-Workbench-x64-setup
          path: release-dist/*.exe

      - name: Upload x64 Setup to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'windows-auto-build' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('PackFlow Workbench {0}', github.ref_name) || 'PackFlow Workbench Auto Build' }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: release-dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Temporarily disabled to keep CI fast while preserving updater latest.json:
      # - MSI build
      # - Portable EXE packaging
      # - Extra updater verification steps
